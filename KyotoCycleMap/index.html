<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>京都自転車マップ</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="info-box">
    <h3>京都サイクリングマップ</h3>

    <label>出発地</label><br>
    <input type="text" id="start" placeholder="例：京都駅">
    <br><br>

    <label>目的地</label><br>
    <input type="text" id="end" placeholder="例：嵐山">
    <br><br>

    <button id="searchRoute">ルート検索</button>
        <div id="elevation-info">
    <p>高低差：未計算</p>
</div>
    <hr>

    <p><span style="color:blue;">●</span> 観光スポット：4か所</p>
    <p><span style="color:green;">●</span> 駐輪場：4か所</p>
    <p><span style="color:red;">●</span> 修理店：3か所</p>
    <p><span style="color:red;">━</span> 推奨サイクリングルート</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="script.js"></script>

</body>
</html>
